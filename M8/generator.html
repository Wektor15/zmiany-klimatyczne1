<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zmiany klimatyczne</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>

<link rel="stylesheet" href="style.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

.container {
    display: flex;
}

/* 🌍 SIDEBAR CO₂ */
.sidebar {
    width: 230px;
    background-color: #1b3a33;
    color: white;
    padding: 20px;
    min-height: 100vh;
    border-right: 4px solid #0EB07C;
    
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 10px 0;
    font-weight: bold;
}

.sidebar a:hover {
    color: #a8e6cf;
}

/* 🌱 TREŚĆ */
.content {
    padding: 20px;
    flex: 1;
}

img {
    max-width: 600px;
    width: 80%;
    border-radius: 10px;
    margin: 15px 0;
}
</style>

</head>

<body>
    <div class="container">
        <div class="sidebar">
            <a href="index.html">Strona Główna</a>

            <hr style="border:1px solid #0EB07C; margin:15px 0;">
        
        </div>

        <div class="content">
            <div class="hero">
                <img src="eco.png" alt="zmiany klimatyczne">
                <div class="hero-text">
                    <h1>🌍 Generator eko-porad</h1>
                    <p>Dbaj o klimat każdego dnia</p>
                </div>
            </div>
            
            
            
            <div id="wynik" class="wynik">
                Kliknij przycisk, aby wygenerować eco poradę!
            </div>

            <button id="losuj-btn" class="btn">
                wygeneruj eco poradę
            </button>
            
            <script type="py">
                import random
                from pyscript import display, when

                porady = [
                    "Wyłączaj światło, gdy wychodzisz z pokoju.",
                    "Zamień tradycyjne żarówki na LED.",
                    "Odłączaj nieużywane ładowarki z gniazdek.",
                    "Postaw na rower lub spacer na krótkich trasach.",
                    "Korzystaj z komunikacji miejskiej zamiast auta.",
                    "Pij wodę z kranu zamiast tej w plastiku.",
                    "Na zakupy zawsze bierz własną torbę materiałową.",
                    "Segreguj śmieci – to naprawdę ma znaczenie.",
                    "Wybieraj szybki prysznic zamiast pełnej wanny.",
                    "Zakręcaj kran podczas mycia zębów.",
                ]

                # Funkcja wywoływana po kliknięciu
                @when("click", "#losuj-btn")
                def losuj_porade(event):
                    wylosowana = random.choice(porady)
                    display(wylosowana, target="wynik", append=False)
            </script>
        </div>
    </div>
</body>
